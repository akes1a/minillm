# v1: tokenizer、数据流、RoPE、FlashAttention、checkpoint 阶段配置。
tokenizer:
  name_or_path: null

data:
  train_path: null
  validation_path: null
  sequence_length: 2048
  streaming: true

model:
  vocab_size: null
  max_seq_len: 2048
  n_layers: 12
  n_heads: 12
  hidden_size: 768
  ffn_hidden_size: 3072
  rope: true
  flash_attention: auto

train:
  batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 0.0003
  max_steps: 10000
  precision: bf16
  checkpoint_dir: checkpoints/v1

